<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Event — Spoorthy EMS</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/form.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="home.html" class="navbar-brand">🎓 <span>Sphoorthy EMS</span></a>
            <ul class="navbar-nav">
                <li><a href="home.html">Home</a></li>
                <li><a href="home.html#clubs">Clubs</a></li>
                <li><a href="all-events.html">Events</a></li>
            </ul>
            <div class="navbar-actions">
                <div class="profile-dropdown">
                    <button class="profile-btn">
                        <div class="profile-avatar" id="profileAvatar">?</div>
                        <div class="profile-info">
                            <div class="profile-name" id="profileName">User</div>
                            <div class="profile-role" id="profileRole">—</div>
                        </div>
                    </button>
                    <div class="dropdown-menu">
                        <button class="dropdown-item danger" onclick="logout()">🚪 Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="form-page">
        <a href="home.html" style="display:inline-flex;align-items:center;gap:.375rem;font-size:.875rem;color:var(--text-muted);margin-bottom:1rem">← Back to Home</a>
        <div class="form-page-header">
            <h1 id="pageTitle">Add New Event</h1>
            <p id="pageSubtitle">Create a new event for students to participate in</p>
        </div>

        <div class="form-card">
            <form id="eventForm" novalidate>
                <div class="form-group">
                    <label for="eventName">Event Name *</label>
                    <input type="text" id="eventName" class="form-control" placeholder="e.g. Code Sprint 2026" required>
                </div>
                <div class="form-group">
                    <label for="clubId">Associated Club *</label>
                    <select id="clubId" class="form-control" required>
                        <option value="" disabled selected>Select a club</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="eventDate">Event Date *</label>
                        <input type="date" id="eventDate" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="eventTime">Event Time *</label>
                        <input type="time" id="eventTime" class="form-control" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="location">Location *</label>
                        <input type="text" id="location" class="form-control" placeholder="e.g. Auditorium, Block A" required>
                    </div>
                    <div class="form-group">
                        <label for="guestSpeaker">Guest Speaker (optional)</label>
                        <input type="text" id="guestSpeaker" class="form-control" placeholder="Speaker name">
                    </div>
                </div>
                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" class="form-control" rows="4" placeholder="Provide a detailed description of the event..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="registrationLink">Registration Link *</label>
                    <input type="url" id="registrationLink" class="form-control" placeholder="https://forms.google.com/..." required>
                </div>

                <!-- Prize Allocation -->
                <div class="form-group">
                    <label>Prize Allocation</label>
                    <div class="prize-rows" id="prizeRows"></div>
                    <button type="button" class="add-prize-btn" id="addPrizeBtn">+ Add Prize</button>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Create Event</button>
                    <a href="home.html" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/add-event.js"></script>
</body>
</html>
