<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Events — Spoorthy EMS</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/home.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="home.html" class="navbar-brand">🎓 <span>Sphoorthy EMS</span></a>
            <ul class="navbar-nav">
                <li><a href="home.html">Home</a></li>
                <li><a href="home.html#clubs">Clubs</a></li>
                <li><a href="all-events.html" class="active">Events</a></li>
            </ul>
            <div class="navbar-actions">
                <a href="add-event.html" class="btn btn-sm btn-primary admin-only">+ Add Event</a>
                <div class="profile-dropdown">
                    <button class="profile-btn">
                        <div class="profile-avatar" id="profileAvatar">?</div>
                        <div class="profile-info">
                            <div class="profile-name" id="profileName">User</div>
                            <div class="profile-role" id="profileRole">—</div>
                        </div>
                    </button>
                    <div class="dropdown-menu">
                        <button class="dropdown-item danger" onclick="logout()">🚪 Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container" style="padding-top:2.5rem">
        <div class="section-header" style="text-align:left;margin-bottom:1.5rem">
            <h2>All Upcoming Events</h2>
            <p>Browse and filter events by club</p>
        </div>

        <!-- Tabs -->
        <div class="tabs" id="eventTabs">
            <button class="tab-btn active">All</button>
        </div>

        <!-- Events Grid -->
        <div class="events-grid" id="allEventsGrid">
            <div class="loading-overlay"><div class="spinner spinner-lg"></div><p>Loading events...</p></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 Sphoorthy Engineering College. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/all-events.js"></script>
</body>
</html>
