<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Club — Spoorthy EMS</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/form.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="home.html" class="navbar-brand">🎓 <span>Sphoorthy EMS</span></a>
            <ul class="navbar-nav">
                <li><a href="home.html">Home</a></li>
                <li><a href="home.html#clubs">Clubs</a></li>
                <li><a href="all-events.html">Events</a></li>
            </ul>
            <div class="navbar-actions">
                <div class="profile-dropdown">
                    <button class="profile-btn">
                        <div class="profile-avatar" id="profileAvatar">?</div>
                        <div class="profile-info">
                            <div class="profile-name" id="profileName">User</div>
                            <div class="profile-role" id="profileRole">—</div>
                        </div>
                    </button>
                    <div class="dropdown-menu">
                        <button class="dropdown-item danger" onclick="logout()">🚪 Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="form-page">
        <a href="home.html" style="display:inline-flex;align-items:center;gap:.375rem;font-size:.875rem;color:var(--text-muted);margin-bottom:1rem">← Back to Home</a>
        <div class="form-page-header">
            <h1 id="pageTitle">Add New Club</h1>
            <p id="pageSubtitle">Create a new club for Spoorthy Engineering College</p>
        </div>

        <div class="form-card">
            <form id="clubForm" novalidate>
                <div class="form-group">
                    <label for="clubName">Club Name *</label>
                    <input type="text" id="clubName" class="form-control" placeholder="e.g. Coders Club" required>
                </div>
                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" class="form-control" rows="4" placeholder="Describe the club's mission, activities, and goals..." required></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="mentorName">Mentor Name *</label>
                        <input type="text" id="mentorName" class="form-control" placeholder="Faculty mentor name" required>
                    </div>
                    <div class="form-group">
                        <label for="mentorEmail">Mentor Email *</label>
                        <input type="email" id="mentorEmail" class="form-control" placeholder="mentor@spoorthy.edu.in" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Club Logo</label>
                    <div class="logo-upload">
                        <input type="file" id="logoInput" accept="image/*">
                        <div class="upload-icon">📷</div>
                        <div class="upload-text">Click to upload or drag & drop<br><strong>PNG, JPG</strong> up to 5MB</div>
                    </div>
                    <div class="logo-preview" id="logoPreview">
                        <img id="logoPreviewImg" src="" alt="Preview">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Create Club</button>
                    <a href="home.html" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/add-club.js"></script>
</body>
</html>
